<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700" role="img" aria-label="SD Équicoaching logo">

  <!-- Oval border en or -->
  <rect x="100" y="20" width="400" height="480" rx="200" ry="200"
        fill="none" stroke="#CDA540" stroke-width="9"/>

  <!-- Tête de cheval stylisée en or (profil droit, haut de l'ovale) -->
  <g fill="none" stroke="#CDA540" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tête principale -->
    <path d="M355,55 C382,50 410,68 422,105 C434,142 420,175 400,193
             C388,202 378,198 374,215 C370,232 376,252 360,262
             C344,272 328,263 323,247 C318,231 326,213 336,202
             C320,189 308,166 312,138 C316,110 332,62 355,55 Z"
          stroke-width="7" fill="rgba(205,165,64,0.08)"/>
    <!-- Crinière — lignes fluides -->
    <path d="M368,57 C378,82 375,110 362,128" stroke-width="5"/>
    <path d="M382,65 C395,92 393,122 378,140" stroke-width="4"/>
    <path d="M395,78 C408,105 406,136 393,154" stroke-width="3.5"/>
    <!-- Oeil -->
    <circle cx="408" cy="118" r="7" fill="#CDA540" stroke="none"/>
    <!-- Narine -->
    <path d="M324,244 C318,254 322,264 330,266" stroke-width="4"/>
    <!-- Lèvre inférieure légère -->
    <path d="M320,250 C316,260 318,268 325,270 C332,272 338,266 336,256"
          stroke-width="3"/>
  </g>

  <!-- Monogramme SD en violet — style ruban/cursive -->
  <!-- Lettre S -->
  <path d="M165,172 C150,148 144,172 160,186 C180,202 178,235 148,252"
        fill="none" stroke="#78427F" stroke-width="20"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lettre D — verticale + arc -->
  <line x1="195" y1="164" x2="195" y2="260"
        stroke="#78427F" stroke-width="20" stroke-linecap="round"/>
  <path d="M195,164 C252,164 282,192 282,212 C282,234 252,260 195,260"
        fill="none" stroke="#78427F" stroke-width="20"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trait décoratif sous le monogramme -->
  <line x1="130" y1="290" x2="310" y2="290"
        stroke="#CDA540" stroke-width="2" opacity="0.6"/>

  <!-- Texte ÉQUICOACHING -->
  <text x="300" y="625"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="54"
        font-weight="700"
        letter-spacing="6"
        fill="#78427F">ÉQUICOACHING</text>

  <!-- Sous-texte optionnel : SD (petites majuscules au-dessus) -->
  <text x="300" y="575"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38"
        font-weight="400"
        letter-spacing="12"
        fill="#CDA540">SD</text>

</svg>
